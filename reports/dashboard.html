<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROWN QA Test Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar { width: 220px; background: #1a1a2e; color: #fff; padding: 24px 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
  .sidebar-logo { padding: 0 24px 32px; font-size: 22px; font-weight: 700; letter-spacing: 2px; }
  .sidebar-logo .crown-w { color: #f0b429; }
  .sidebar-section { padding: 24px 24px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #4a4e69; }
  .sidebar-nav { list-style: none; }
  .sidebar-nav li { padding: 10px 24px; font-size: 14px; color: #8b8fa3; cursor: pointer; display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent; }
  .sidebar-nav li.active { background: rgba(240,180,41,0.1); color: #f0b429; border-left-color: #f0b429; }

  /* Main */
  .main { margin-left: 220px; flex: 1; padding: 32px 40px; max-width: calc(100vw - 220px); }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .page-header h1 { font-size: 24px; font-weight: 600; }
  .page-header .meta { font-size: 13px; color: #6c757d; }

  /* Bugs Panel (top) */
  .bugs-panel { background: #fff; border: 1px solid #ffcdd2; border-left: 4px solid #dc3545; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .bugs-panel.collapsed .bugs-panel-body { display: none; }
  .bugs-panel-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .bugs-panel-header h2 { font-size: 16px; font-weight: 600; color: #1a1a2e; display: flex; align-items: center; gap: 10px; }
  .bugs-panel-header .bug-counts { display: flex; gap: 8px; }
  .bugs-panel-body { margin-top: 16px; }
  .bug-card { display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: start; padding: 14px; background: #fafafa; border: 1px solid #e9ecef; border-radius: 8px; margin-bottom: 10px; }
  .bug-card:last-child { margin-bottom: 0; }
  .bug-card.severity-block { border-left: 3px solid #dc3545; }
  .bug-card.severity-minor { border-left: 3px solid #ffc107; }
  .bug-card .sev-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .bug-card.severity-block .sev-tag { background: #ffebee; color: #c62828; }
  .bug-card.severity-minor .sev-tag { background: #fff8e1; color: #f57f17; }
  .bug-card .bug-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .bug-card .bug-meta { font-size: 12px; color: #6c757d; margin-bottom: 6px; }
  .bug-card .bug-detail { font-size: 12px; color: #495057; line-height: 1.4; }
  .bug-card .bug-detail strong { color: #1a1a2e; }
  .bug-card .bug-jump { background: none; border: 1px solid #dee2e6; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #1565c0; white-space: nowrap; }
  .bug-card .bug-jump:hover { background: #e3f2fd; }
  .bug-thumb { width: 80px; height: 50px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid #e9ecef; }
  .toggle-arrow { font-size: 12px; color: #6c757d; transition: transform 0.2s; }
  .bugs-panel.collapsed .toggle-arrow { transform: rotate(-90deg); }

  /* Filters */
  .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { font-size: 12px; font-weight: 600; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-chips { display: flex; gap: 4px; }
  .chip { padding: 6px 14px; border-radius: 20px; border: 1px solid #dee2e6; background: #fff; cursor: pointer; font-size: 13px; color: #495057; user-select: none; }
  .chip:hover { border-color: #f0b429; }
  .chip.active { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }
  .filter-sep { width: 1px; height: 28px; background: #dee2e6; margin: 0 8px; }
  select.filter-select { padding: 6px 12px; border-radius: 8px; border: 1px solid #dee2e6; background: #fff; font-size: 13px; color: #495057; cursor: pointer; }
  .toggle-bugs { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 13px; color: #495057; cursor: pointer; user-select: none; }
  .toggle-bugs input { cursor: pointer; }

  /* Summary */
  .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .scard { background: #fff; border: 1px solid #e9ecef; border-radius: 12px; padding: 20px; text-align: center; }
  .scard .num { font-size: 32px; font-weight: 700; }
  .scard .lbl { font-size: 12px; color: #6c757d; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .scard.s-total .num { color: #1a1a2e; }
  .scard.s-pass .num { color: #28a745; }
  .scard.s-minor .num { color: #ffc107; }
  .scard.s-block .num { color: #dc3545; }
  .progress-bar { height: 6px; background: #e9ecef; border-radius: 3px; margin-bottom: 24px; overflow: hidden; display: flex; }
  .progress-bar .p-ok { background: #28a745; }
  .progress-bar .p-minor { background: #ffc107; }
  .progress-bar .p-block { background: #dc3545; }

  /* Runs table */
  .runs-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 12px; border: 1px solid #e9ecef; overflow: hidden; margin-bottom: 24px; }
  .runs-table th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #6c757d; border-bottom: 1px solid #e9ecef; font-weight: 600; }
  .runs-table td { padding: 14px 16px; border-bottom: 1px solid #f1f3f5; font-size: 14px; vertical-align: middle; }
  .runs-table tr:last-child td { border-bottom: none; }
  .runs-table tr { cursor: pointer; }
  .runs-table tbody tr:hover { background: #f8f9fa; }
  .runs-table tbody tr.selected { background: #fff8e1; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-english { background: #e3f2fd; color: #1565c0; }
  .badge-dutch { background: #fce4ec; color: #c62828; }
  .score { font-weight: 700; font-size: 14px; }
  .score-perfect { color: #2e7d32; }
  .score-partial { color: #f57f17; }
  .score-fail { color: #c62828; }

  /* Detail panel */
  .detail-panel { background: #fff; border: 1px solid #e9ecef; border-radius: 12px; padding: 24px; margin-bottom: 24px; display: none; }
  .detail-panel.visible { display: block; }
  .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .detail-header h2 { font-size: 18px; font-weight: 600; }
  .detail-header .close-btn { background: none; border: 1px solid #dee2e6; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; color: #6c757d; }
  .detail-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; padding: 16px; background: #f8f9fa; border-radius: 8px; }
  .detail-info dt { font-size: 11px; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-info dd { font-size: 14px; font-weight: 500; margin-top: 2px; }

  /* Test cards (enriched) */
  .test-list { display: flex; flex-direction: column; gap: 8px; }
  .test-card { background: #fff; border: 1px solid #e9ecef; border-radius: 8px; padding: 14px 16px; transition: border-color 0.15s; }
  .test-card:hover { border-color: #dee2e6; }
  .test-card.status-ok { border-left: 3px solid #28a745; }
  .test-card.status-minor { border-left: 3px solid #ffc107; background: #fffdf5; }
  .test-card.status-block { border-left: 3px solid #dc3545; background: #fff5f5; }
  .test-card-header { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .test-card-id { font-weight: 700; font-size: 13px; color: #1a1a2e; font-family: ui-monospace, monospace; background: #f1f3f5; padding: 2px 6px; border-radius: 4px; }
  .test-card-title { flex: 1; font-size: 14px; font-weight: 500; }
  .test-card-status { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 10px; border-radius: 12px; }
  .status-ok .test-card-status { background: #e8f5e9; color: #2e7d32; }
  .status-minor .test-card-status { background: #fff8e1; color: #f57f17; }
  .status-block .test-card-status { background: #ffebee; color: #c62828; }
  .test-card-toggle { font-size: 10px; color: #6c757d; transition: transform 0.2s; }
  .test-card.expanded .test-card-toggle { transform: rotate(90deg); }
  .test-card-body { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid #f1f3f5; }
  .test-card.expanded .test-card-body { display: block; }
  .test-card-body .row { display: grid; grid-template-columns: 100px 1fr; gap: 12px; font-size: 13px; margin-bottom: 8px; }
  .test-card-body .row .label { color: #6c757d; font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; padding-top: 2px; }
  .test-card-body .row .value { color: #1a1a2e; line-height: 1.5; word-break: break-word; }
  .test-card-body .row .value.obs { color: #c62828; }
  .test-card.status-ok .test-card-body .row .value.obs { color: #2e7d32; }
  .test-card-screenshot { margin-top: 12px; }
  .test-card-screenshot img { max-width: 280px; max-height: 180px; border: 1px solid #e9ecef; border-radius: 6px; cursor: pointer; display: block; }
  .test-card-screenshot .caption { font-size: 11px; color: #6c757d; margin-top: 4px; }

  /* Screenshot modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 40px; }
  .modal-overlay.visible { display: flex; }
  .modal-overlay img { max-width: 100%; max-height: 100%; border-radius: 8px; }
  .modal-close { position: absolute; top: 20px; right: 30px; background: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; font-weight: 700; color: #1a1a2e; }

  .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e9ecef; color: #adb5bd; font-size: 12px; text-align: center; }
</style>
</head>
<body>

<!-- Screenshot modal -->
<div class="modal-overlay" id="screenshot-modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">×</button>
  <img id="modal-img" src="" alt="">
</div>

<nav class="sidebar">
  <div class="sidebar-logo">CR<span class="crown-w">O</span>WN</div>
  <div class="sidebar-section">Navigation</div>
  <ul class="sidebar-nav"><li class="active">Test Tracker</li></ul>
</nav>

<div class="main">
  <div class="page-header">
    <h1>QA Test Tracker</h1>
    <div class="meta" id="header-meta"></div>
  </div>

  <!-- Bugs Panel — collapsed by default (click header to expand) -->
  <div class="bugs-panel collapsed" id="bugs-panel">
    <div class="bugs-panel-header" onclick="toggleBugsPanel()">
      <h2>
        <span>🐛</span>
        <span>Active Bugs</span>
        <span class="bug-counts" id="bug-counts"></span>
      </h2>
      <span class="toggle-arrow">▼</span>
    </div>
    <div class="bugs-panel-body" id="bugs-panel-body"></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group"><span class="filter-label">Type</span><div class="filter-chips" id="filter-type"></div></div>
    <div class="filter-sep"></div>
    <div class="filter-group"><span class="filter-label">Date</span><select class="filter-select" id="filter-date"><option value="">All dates</option></select></div>
    <div class="filter-sep"></div>
    <div class="filter-group"><span class="filter-label">Test</span><select class="filter-select" id="filter-test"><option value="">All tests</option></select></div>
    <label class="toggle-bugs"><input type="checkbox" id="bugs-only" onchange="toggleBugsOnly(this)"> Show bugs only</label>
  </div>

  <!-- Summary -->
  <div class="summary-cards" id="summary-cards"></div>
  <div class="progress-bar" id="progress-bar"></div>

  <!-- Runs table -->
  <table class="runs-table">
    <thead><tr><th>Run</th><th>Type</th><th>Platform</th><th>Auction</th><th>Date</th><th>Score</th><th>Pass</th><th>Minor</th><th>Blocking</th></tr></thead>
    <tbody id="runs-tbody"></tbody>
  </table>

  <!-- Detail panel -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header"><h2 id="detail-title"></h2><button class="close-btn" onclick="closeDetail()">Close</button></div>
    <div class="detail-info" id="detail-info"></div>
    <div class="test-list" id="detail-tests"></div>
  </div>

  <div class="footer">CROWN QA Test Tracker</div>
</div>

// Sort by actual run time DESC — latest first
reports.sort((a, b) => (b._sortTime || 0) - (a._sortTime || 0));

let activeType = '', activeDate = '', activeTest = '', selectedRun = -1, bugsOnly = false;

// Collect all unique types, dates, test IDs
const types = [...new Set(reports.map(r => r.auctionType))].sort();
const dates = [...new Set(reports.map(r => r.date))].sort().reverse();
const allTestIds = [...new Set(reports.flatMap(r => r.tests.map(t => t.id)))].sort();

// Build filter chips
document.getElementById('filter-type').innerHTML = '<div class="chip active" data-val="" onclick="setType(this)">All</div>' +
  types.map(t => '<div class="chip" data-val="' + t + '" onclick="setType(this)">' + t + '</div>').join('');
// Date filter: dropdown (was chips — got too crowded with many test days)
const dateSel = document.getElementById('filter-date');
dates.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; dateSel.appendChild(o); });
dateSel.addEventListener('change', () => { activeDate = dateSel.value; render(); });

const testSel = document.getElementById('filter-test');
allTestIds.forEach(id => { const o = document.createElement('option'); o.value = id; o.textContent = id; testSel.appendChild(o); });
testSel.addEventListener('change', () => { activeTest = testSel.value; render(); });

function setType(el) { activeType = el.dataset.val; el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); render(); }
function toggleBugsOnly(cb) { bugsOnly = cb.checked; render(); }
function toggleBugsPanel() { document.getElementById('bugs-panel').classList.toggle('collapsed'); }

function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('screenshot-modal').classList.add('visible');
}
function closeModal() { document.getElementById('screenshot-modal').classList.remove('visible'); }

function renderBugsPanel(filtered) {
  const allBugs = [];
  filtered.forEach(r => {
    r.tests.forEach(t => {
      if (t.status !== 'ok') {
        allBugs.push({ ...t, runLabel: r.runLabel, runIdx: reports.indexOf(r) });
      }
    });
  });

  const blocking = allBugs.filter(b => b.status === 'blocking_bug').length;
  const minor = allBugs.filter(b => b.status === 'minor_bug').length;

  document.getElementById('bug-counts').innerHTML =
    (blocking > 0 ? '<span class="badge" style="background:#ffebee;color:#c62828">' + blocking + ' blocking</span>' : '') +
    (minor > 0 ? '<span class="badge" style="background:#fff8e1;color:#f57f17">' + minor + ' minor</span>' : '') +
    (allBugs.length === 0 ? '<span class="badge" style="background:#e8f5e9;color:#2e7d32">0 bugs</span>' : '');

  const body = document.getElementById('bugs-panel-body');
  if (allBugs.length === 0) {
    body.innerHTML = '<div style="padding:20px;text-align:center;color:#6c757d;font-size:13px">No active bugs. All tests pass!</div>';
    return;
  }

  // Sort: blocking first, then minor
  allBugs.sort((a, b) => (a.status === 'blocking_bug' ? 0 : 1) - (b.status === 'blocking_bug' ? 0 : 1));

  body.innerHTML = allBugs.map(b => {
    const sev = b.status === 'blocking_bug' ? 'block' : 'minor';
    const sevLabel = b.status === 'blocking_bug' ? 'BLOCKING' : 'MINOR';
    const thumb = b.screenshot ? '<img class="bug-thumb" src="' + b.screenshot + '" onclick="event.stopPropagation();openModal(\'' + b.screenshot + '\')" alt="">' : '<div style="width:80px"></div>';
    return '<div class="bug-card severity-' + sev + '" onclick="jumpToRun(' + b.runIdx + ', \'' + b.id + '\')">' +
      thumb +
      '<div>' +
        '<div class="bug-title"><span class="sev-tag">' + sevLabel + '</span> ' + escapeHtml(b.description || b.id) + '</div>' +
        '<div class="bug-meta">In run: <strong>' + escapeHtml(b.runLabel || '') + '</strong> · Test ID: <code>' + b.id + '</code></div>' +
        '<div class="bug-detail"><strong>Expected:</strong> ' + escapeHtml(b.expected || '-') + '<br><strong>Observed:</strong> ' + escapeHtml(b.observed || '-') + '</div>' +
      '</div>' +
      '<button class="bug-jump" onclick="event.stopPropagation();jumpToRun(' + b.runIdx + ', \'' + b.id + '\')">View run →</button>' +
    '</div>';
  }).join('');
}

function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function jumpToRun(idx, testId) {
  selectedRun = idx;
  render();
  setTimeout(() => {
    const panel = document.getElementById('detail-panel');
    if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Expand the specific test card
    if (testId) {
      setTimeout(() => {
        const card = document.querySelector('[data-test-id="' + testId + '"]');
        if (card) {
          card.classList.add('expanded');
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 400);
    }
  }, 100);
}

function toggleTestCard(el) { el.closest('.test-card').classList.toggle('expanded'); }

function render() {
  let filtered = reports;
  if (activeType) filtered = filtered.filter(r => r.auctionType === activeType);
  if (activeDate) filtered = filtered.filter(r => r.date === activeDate);
  if (activeTest) filtered = filtered.filter(r => r.tests.some(t => t.id === activeTest));
  if (bugsOnly) filtered = filtered.filter(r => r.summary.minor > 0 || r.summary.blocking > 0);

  // Summary
  let tot = 0, ok = 0, minor = 0, block = 0;
  filtered.forEach(r => { tot += r.summary.total; ok += r.summary.ok; minor += r.summary.minor; block += r.summary.blocking; });
  document.getElementById('summary-cards').innerHTML =
    '<div class="scard s-total"><div class="num">' + tot + '</div><div class="lbl">Total Tests</div></div>' +
    '<div class="scard s-pass"><div class="num">' + ok + '</div><div class="lbl">Passed</div></div>' +
    '<div class="scard s-minor"><div class="num">' + minor + '</div><div class="lbl">Minor Bugs</div></div>' +
    '<div class="scard s-block"><div class="num">' + block + '</div><div class="lbl">Blocking</div></div>';
  const pct = n => tot > 0 ? (n / tot * 100).toFixed(1) : 0;
  document.getElementById('progress-bar').innerHTML = '<div class="p-ok" style="width:' + pct(ok) + '%"></div><div class="p-minor" style="width:' + pct(minor) + '%"></div><div class="p-block" style="width:' + pct(block) + '%"></div>';
  document.getElementById('header-meta').textContent = filtered.length + ' runs \u2022 ' + tot + ' tests';

  // Bugs panel (based on filtered)
  renderBugsPanel(filtered);

  // Runs table
  const tbody = document.getElementById('runs-tbody');
  tbody.innerHTML = filtered.map(r => {
    const origIdx = reports.indexOf(r);
    const scoreClass = r.summary.ok === r.summary.total ? 'score-perfect' : r.summary.blocking > 0 ? 'score-fail' : 'score-partial';
    const typeBadge = r.auctionType === 'Dutch' ? 'badge-dutch' : 'badge-english';
    const platform = (r.platform || '').replace('https://','').replace('http://','');
    const auctionId = r.auctionUrl ? (r.auctionUrl.split('/auctions/')[1] || '-').substring(0,8) : '-';
    const auctionCell = r.auctionUrl ? '<a href="' + r.auctionUrl + '" target="_blank" style="color:#1565c0;text-decoration:none;font-size:12px" onclick="event.stopPropagation()">' + auctionId + '...</a>' : '-';
    return '<tr onclick="selectRun(' + origIdx + ')" class="' + (selectedRun === origIdx ? 'selected' : '') + '">' +
      '<td><strong>' + escapeHtml(r.runLabel || '') + '</strong></td>' +
      '<td><span class="badge ' + typeBadge + '">' + r.auctionType + '</span></td>' +
      '<td style="color:#6c757d;font-size:13px">' + platform + '</td>' +
      '<td>' + auctionCell + '</td>' +
      '<td style="font-size:12px;white-space:nowrap">' + (r._timeLabel || r.date) + '</td>' +
      '<td><span class="score ' + scoreClass + '">' + r.summary.ok + '/' + r.summary.total + '</span></td>' +
      '<td style="color:#2e7d32;font-weight:600">' + r.summary.ok + '</td>' +
      '<td style="color:#f57f17;font-weight:600">' + (r.summary.minor || '-') + '</td>' +
      '<td style="color:#c62828;font-weight:600">' + (r.summary.blocking || '-') + '</td>' +
    '</tr>';
  }).join('');

  // Detail
  if (selectedRun >= 0 && filtered.includes(reports[selectedRun])) showDetail(reports[selectedRun]);
  else document.getElementById('detail-panel').classList.remove('visible');
}

function selectRun(idx) { selectedRun = selectedRun === idx ? -1 : idx; render(); }
function closeDetail() { selectedRun = -1; render(); }

function showDetail(r) {
  const panel = document.getElementById('detail-panel'); panel.classList.add('visible');
  document.getElementById('detail-title').textContent = r.runLabel || '';
  const platform = (r.platform || '').replace('https://','').replace('http://','');
  const auctionId = r.auctionUrl ? (r.auctionUrl.split('/auctions/')[1] || '-').substring(0,8) : '-';
  const auctionLink = r.auctionUrl ? '<a href="' + r.auctionUrl + '" target="_blank" style="color:#1565c0;text-decoration:none">' + auctionId + '...</a>' : '-';
  document.getElementById('detail-info').innerHTML =
    '<div><dt>Platform</dt><dd>' + platform + '</dd></div>' +
    '<div><dt>Type</dt><dd>' + r.auctionType + '</dd></div>' +
    '<div><dt>Ran at</dt><dd>' + (r._timeLabel || r.date) + '</dd></div>' +
    '<div><dt>Phase</dt><dd>' + escapeHtml(r.phase || '-') + '</dd></div>' +
    '<div><dt>Auction</dt><dd>' + auctionLink + '</dd></div>';

  let tests = r.tests;
  if (activeTest) tests = tests.filter(t => t.id === activeTest);

  const stCls = { ok: 'status-ok', minor_bug: 'status-minor', blocking_bug: 'status-block' };
  const stLbl = { ok: 'Pass', minor_bug: 'Minor Bug', blocking_bug: 'Blocking' };

  document.getElementById('detail-tests').innerHTML = tests.map(t => {
    const cls = stCls[t.status];
    const screenshot = t.screenshot ? '<div class="test-card-screenshot"><img src="' + t.screenshot + '" onclick="openModal(\'' + t.screenshot + '\')" alt="screenshot"><div class="caption">Click to enlarge</div></div>' : '';
    const openClass = t.status !== 'ok' ? ' expanded' : '';
    return '<div class="test-card ' + cls + openClass + '" data-test-id="' + t.id + '">' +
      '<div class="test-card-header" onclick="toggleTestCard(this)">' +
        '<span class="test-card-id">' + t.id + '</span>' +
        '<span class="test-card-title">' + escapeHtml(t.description || '') + '</span>' +
        '<span class="test-card-status">' + stLbl[t.status] + '</span>' +
        '<span class="test-card-toggle">▶</span>' +
      '</div>' +
      '<div class="test-card-body">' +
        '<div class="row"><div class="label">Expected</div><div class="value">' + escapeHtml(t.expected || '-') + '</div></div>' +
        '<div class="row"><div class="label">Observed</div><div class="value obs">' + escapeHtml(t.observed || '-') + '</div></div>' +
        (t.timestamp ? '<div class="row"><div class="label">Time</div><div class="value" style="color:#6c757d;font-size:12px">' + new Date(t.timestamp).toLocaleString('fr-FR') + '</div></div>' : '') +
        screenshot +
      '</div>' +
    '</div>';
  }).join('');

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

render();
</script>
</body>
</html>
